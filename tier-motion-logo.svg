<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ff6b30" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ff4d00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b30"/>
      <stop offset="100%" stop-color="#ff4d00"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="900" height="1300" fill="url(#bgGrad)"/>
  <rect width="900" height="1300" fill="url(#glow1)"/>

  <!-- motion light streaks -->
  <g opacity="0.35" stroke="#ff6b30" stroke-width="2" filter="url(#blur2)">
    <line x1="80" y1="300" x2="380" y2="420"/>
    <line x1="60" y1="360" x2="340" y2="470"/>
    <line x1="820" y1="900" x2="540" y2="780"/>
    <line x1="850" y1="960" x2="580" y2="830"/>
  </g>

  <!-- central rotated diamond mark -->
  <g transform="translate(450,560)">
    <rect x="-130" y="-130" width="260" height="260" rx="18" fill="url(#diamondGrad)" transform="rotate(45)" opacity="0.92"/>
    <rect x="-130" y="-130" width="260" height="260" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" transform="rotate(45)"/>
    <rect x="-72" y="-72" width="144" height="144" rx="10" fill="#0a0a0a" transform="rotate(45)" opacity="0.85"/>
    <rect x="-72" y="-72" width="144" height="144" rx="10" fill="none" stroke="#ff6b30" stroke-width="1.5" transform="rotate(45)"/>
  </g>

  <!-- particle field -->
  <g fill="#ff6b30">
    <circle cx="180" cy="220" r="3" opacity="0.8"/>
    <circle cx="230" cy="180" r="2" opacity="0.6"/>
    <circle cx="700" cy="260" r="3" opacity="0.7"/>
    <circle cx="760" cy="320" r="2" opacity="0.5"/>
    <circle cx="640" cy="980" r="3" opacity="0.7"/>
    <circle cx="200" cy="1020" r="2.5" opacity="0.6"/>
    <circle cx="150" cy="950" r="2" opacity="0.4"/>
    <circle cx="500" cy="240" r="2" opacity="0.5"/>
    <circle cx="300" cy="1080" r="2" opacity="0.5"/>
  </g>

  <!-- glow under diamond -->
  <ellipse cx="450" cy="700" rx="220" ry="60" fill="#ff4d00" opacity="0.25" filter="url(#blur1)"/>

  <!-- bottom vignette -->
  <rect x="0" y="1000" width="900" height="300" fill="#000000" opacity="0.55"/>

  <!-- thin frame lines, cinematic crop marks -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5">
    <line x1="60" y1="60" x2="60" y2="110"/>
    <line x1="60" y1="60" x2="110" y2="60"/>
    <line x1="840" y1="60" x2="840" y2="110"/>
    <line x1="840" y1="60" x2="790" y2="60"/>
    <line x1="60" y1="1240" x2="60" y2="1190"/>
    <line x1="60" y1="1240" x2="110" y2="1240"/>
    <line x1="840" y1="1240" x2="840" y2="1190"/>
    <line x1="840" y1="1240" x2="790" y2="1240"/>
  </g>
</svg>
