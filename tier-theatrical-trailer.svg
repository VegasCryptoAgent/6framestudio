<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="beam" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff6b30" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#ff6b30" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft2"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="900" height="1300" fill="url(#bgGrad3)"/>

  <!-- projector beam, fanning down from top -->
  <polygon points="430,40 470,40 640,560 260,560" fill="url(#beam)" opacity="0.7"/>
  <rect width="900" height="1300" fill="url(#screenGlow)"/>

  <!-- cinema screen frame -->
  <rect x="170" y="560" width="560" height="330" rx="6" fill="#0d0d0d" stroke="#ff6b30" stroke-width="2" stroke-opacity="0.7"/>
  <rect x="190" y="580" width="520" height="290" fill="#000000"/>
  <rect x="190" y="580" width="520" height="290" fill="#ff4d00" opacity="0.06"/>

  <!-- countdown ring motif -->
  <g transform="translate(450,725)">
    <circle r="92" fill="none" stroke="#ff6b30" stroke-width="2" opacity="0.55"/>
    <circle r="92" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 10" opacity="0.25"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#ff4d00" stroke-width="3"/>
    <line x1="0" y1="0" x2="50" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <circle r="6" fill="#ff6b30"/>
  </g>

  <!-- film reel silhouette, lower right -->
  <g transform="translate(700,1080)" opacity="0.85">
    <circle r="110" fill="#0d0d0d" stroke="#ff6b30" stroke-width="2" stroke-opacity="0.5"/>
    <circle r="26" fill="none" stroke="#ff4d00" stroke-width="3"/>
    <circle cx="55" cy="-35" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
    <circle cx="-55" cy="-35" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
    <circle cx="55" cy="55" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
    <circle cx="-55" cy="55" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
    <circle cx="0" cy="75" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
  </g>

  <!-- spotlight dust particles -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="380" cy="240" r="2"/>
    <circle cx="520" cy="300" r="1.6"/>
    <circle cx="460" cy="180" r="1.4"/>
    <circle cx="350" cy="400" r="2"/>
    <circle cx="540" cy="450" r="1.6"/>
  </g>

  <rect x="0" y="1180" width="900" height="120" fill="#000000" opacity="0.6"/>
</svg>
